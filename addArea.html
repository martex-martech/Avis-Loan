<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Area</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f9fafb;
      padding-top: 60px;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background-color: #4f46e5;
      color: white;
      padding: 1rem;
      display: flex;
      align-items: center;
      z-index: 50;
    }
    .header-title {
      position: absolute;
      left: 0;
      right: 0;
      text-align: center;
      margin: 0 auto;
      font-weight: 500;
    }
    .form-container {
      padding: 2rem 1rem;
      max-width: 500px;
      margin: 0 auto;
    }
    .input-field {
      width: 100%;
      padding: 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }
    .submit-btn {
      background-color: #4f46e5;
      color: white;
      padding: 1rem;
      border-radius: 0.5rem;
      width: 100%;
      border: none;
      font-size: 1rem;
      font-weight: 500;
    }
    .submit-btn:active {
      background-color: #4338ca;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="javascript:history.back()" class="mr-4 text-white z-10">
      <i class="fas fa-chevron-left"></i>
    </a>
    <h1 class="text-lg header-title">Add New Area</h1>
  </header>

  <!-- Main Content -->
  <main class="form-container">
    <form id="addAreaForm">
      <input 
        type="text" 
        class="input-field" 
        placeholder="Enter area name" 
        required
        autofocus
      >
      <button type="submit" class="submit-btn">
        Save Area
      </button>
    </form>
  </main>

  <script>
    document.getElementById('addAreaForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const areaName = this.querySelector('input').value.trim();
      
      if (areaName) {
        // In a real app, you would save the area here
        // For now, we'll just go back to the previous page
        history.back();
        
        // You might want to pass the new area name back like this:
        // localStorage.setItem('newArea', areaName);
      }
    });
  </script>
</body>
</html>
