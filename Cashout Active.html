<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CashOut</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Google Fonts - Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --secondary: #f9fafb;
      --text: #111827;
      --text-light: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: white;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-top: 60px; /* Space for fixed header */
      padding-bottom: 80px; /* Space for fixed nav */
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      height: 60px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-left: 12px;
    }

    .header-action {
      color: white;
      font-size: 18px;
      padding: 4px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background-color: white;
      position: sticky;
      top: 60px;
      z-index: 40;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-light);
      position: relative;
      cursor: pointer;
      text-decoration: none;
    }

    .tab.active {
      color: var(--primary);
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 30%;
      right: 30%;
      height: 2px;
      background-color: var(--primary);
    }

    .dropdown-container {
      position: relative;
      max-width: 600px;
      margin: 24px auto;
      width: calc(100% - 32px);
    }

    .dropdown-selected {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      background: white;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      text-align: center;
    }

    .dropdown-options {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid var(--border);
      border-top: none;
      z-index: 100;
      display: none;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .dropdown-options div {
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 15px;
      color: var(--text);
    }

    .dropdown-options div:hover {
      background: var(--secondary);
    }

    .dropdown-options div:first-child {
      font-weight: 600;
      color: var(--primary);
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: white;
      padding: 12px 0;
      z-index: 40;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
      height: 80px;
    }

    .nav-items {
      display: flex;
      justify-content: space-around;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-light);
      font-size: 12px;
      padding: 4px 12px;
    }

    .nav-item i {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .nav-item.active {
      color: var(--primary);
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="header">
    <a href="Collection.html" class="header-action">
      <i class="fas fa-chevron-left"></i>
    </a>
    <div class="header-title">CashOut</div>
    <a href="Cashout +.html" class="header-action">
      <i class="fas fa-plus"></i>
    </a>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active">ACTIVE</div>
    <a href="Cashout History.html" class="tab">HISTORY</a>
  </div>

  <!-- Custom Dropdown -->
  <div class="dropdown-container">
    <div class="dropdown-selected" id="dropdownSelected">Line</div>
    <div class="dropdown-options" id="dropdownOptions">
      <div data-value="one">Line</div>
      <div data-value="two">Two</div>
      <div data-value="three">Three</div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="nav">
    <div class="nav-items">
      <a href="Collection.html" class="nav-item">
        <i class="fas fa-coins"></i>
        <span>Collection</span>
      </a>
      <a href="Expense.html" class="nav-item">
        <i class="fas fa-receipt"></i>
        <span>Expense</span>
      </a>
      <a href="Customer.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Customers</span>
      </a>
      <a href="Reports.html" class="nav-item">
        <i class="fas fa-chart-pie"></i>
        <span>Reports</span>
      </a>
      <a href="Settings.html" class="nav-item active">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </div>
  </nav>

  <script>
    const dropdownSelected = document.getElementById('dropdownSelected');
    const dropdownOptions = document.getElementById('dropdownOptions');

    dropdownSelected.addEventListener('click', () => {
      dropdownOptions.style.display = dropdownOptions.style.display === 'block' ? 'none' : 'block';
    });

    dropdownOptions.querySelectorAll('div').forEach(option => {
      option.addEventListener('click', () => {
        dropdownSelected.innerText = option.innerText;
        dropdownOptions.style.display = 'none';
      });
    });

    window.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown-container')) {
        dropdownOptions.style.display = 'none';
      }
    });
  </script>
</body>
</html>
