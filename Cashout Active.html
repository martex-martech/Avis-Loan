  <title>CashOut UI</title>

  <!-- Google Font: Tinos -->
  <link href="https://fonts.googleapis.com/css2?family=Tinos&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tinos', serif;
      background-color: #fff;
      color: #333;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      background-color: #fff;
    }

    .header .left,
    .header .right {
      display: flex;
      align-items: center;
    }

    .back-arrow {
      font-size: 20px;
      margin-right: 8px;
      cursor: pointer;
    }

    .title {
      font-size: 20px;
      font-weight: 500;
    }

    .plus {
      font-size: 24px;
      cursor: pointer;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #ccc;
      background-color: #fff;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      font-size: 16px;
      font-weight: 500;
      color: gray;
      position: relative;
      cursor: pointer;
      text-decoration: none;
    }

    .tab.active {
      color: #007bff;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 30%;
      right: 30%;
      height: 2px;
      background-color: #007bff;
    }

    /* Custom Dropdown */
    .dropdown-container {
      position: relative;
      max-width: 300px;
      margin: 24px 16px;
    }

    .dropdown-selected {
      padding: 15px;
      border: 1px solid #dbe1e6;
      border-radius: 8px;
      cursor: pointer;
      background: #fff;
      font-size: 16px;
      text-align: center;
      font-weight: bold;
      color: #111518;
    }

    .dropdown-options {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #dbe1e6;
      border-top: none;
      z-index: 100;
      display: none;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .dropdown-options div {
      padding: 12px;
      text-align: center;
      cursor: pointer;
      font-size: 16px;
    }

    .dropdown-options div:hover {
      background: #f1f1f1;
    }

    @media (max-width: 600px) {
      .title {
        font-size: 18px;
      }

      .plus, .back-arrow {
        font-size: 20px;
      }

      .tab {
        font-size: 14px;
      }

      .dropdown-selected {
        font-size: 14px;
      }

      .nav-icons {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .nav-icons i {
        font-size: 20px;
        color: #333;
        position: relative;
        cursor: pointer;
      }

      .notification {
        position: relative;
      }

      .badge {
        position: absolute;
        top: -8px;
        right: -10px;
        background-color: red;
        color: white;
        font-size: 12px;
        padding: 2px 6px;
        border-radius: 10px;
      }
    }
    .bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background-color: white; /* or your preferred color */
  box-shadow: 0 -2px 5px rgba(0,0,0,0.1); /* optional shadow */
  z-index: 100;
}

  </style>
</head>

  <!-- Header -->

    </div>
    <div class="right">

    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active">ACTIVE</div>
    <a href="Cashout History.html" class="tab">HISTORY</a>
  </div>

  <!-- Custom Dropdown -->
  <div class="dropdown-container">
    <div class="dropdown-selected" id="dropdownSelected">Line</div>
    <div class="dropdown-options" id="dropdownOptions">
      <div data-value="one" style="font-weight: bold;">Line</div>
      <div data-value="two">Two</div>
      <div data-value="three">Three</div>
    </div>
  </div>

  <script>
    const dropdownSelected = document.getElementById('dropdownSelected');
    const dropdownOptions = document.getElementById('dropdownOptions');

    dropdownSelected.addEventListener('click', () => {
      dropdownOptions.style.display = dropdownOptions.style.display === 'block' ? 'none' : 'block';
    });

    dropdownOptions.querySelectorAll('div').forEach(option => {
      option.addEventListener('click', () => {
        dropdownSelected.innerText = option.innerText;
        dropdownOptions.style.display = 'none';
      });
    });

    window.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown-container')) {
        dropdownOptions.style.display = 'none';
      }
    });
  </script>
