<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Add Area</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Google Fonts - Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --secondary: #f9fafb;
      --text: #111827;
      --text-light: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f3f4f6;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .main-content {
      padding: 24px 16px;
      margin-top: 60px;
      margin-bottom: 80px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-light);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
      background-color: white;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
    }

    .btn-primary:hover {
      background-color: var(--primary-light);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: white;
      padding: 12px 0;
      z-index: 40;
    }

    .nav-items {
      display: flex;
      justify-content: space-around;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-light);
      font-size: 12px;
      padding: 4px 12px;
    }

    .nav-item i {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .nav-item.active {
      color: var(--primary);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="header">
    <a href="AreaSettings.html" class="header-action">
      <i class="fas fa-chevron-left"></i>
    </a>
    <div class="header-title">Add Area</div>
    <div class="header-actions"></div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div class="form-group">
      <label class="form-label">Area Name</label>
      <input type="text" class="form-input" placeholder="Enter area name" autofocus>
    </div>

    <button class="btn btn-primary w-full">
      SAVE AREA
    </button>
  </main>

  <!-- Bottom Navigation -->
  <nav class="nav">
    <div class="nav-items">
      <a href="Collection.html" class="nav-item">
        <i class="fas fa-coins"></i>
        <span>Collection</span>
      </a>
      <a href="Expense.html" class="nav-item">
        <i class="fas fa-receipt"></i>
        <span>Expense</span>
      </a>
      <a href="Customer.html" class="nav-item">
        <i class="fas fa-users"></i>
        <span>Customers</span>
      </a>
      <a href="Reports.html" class="nav-item">
        <i class="fas fa-chart-pie"></i>
        <span>Reports</span>
      </a>
      <a href="Settings.html" class="nav-item active">
        <i class="fas fa-cog"></i>
        <span>Settings</span>
      </a>
    </div>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Add active state to clicked buttons
      document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', function () {
          this.classList.add('active');
          setTimeout(() => {
            this.classList.remove('active');
          }, 150);
        });
      });
    });
  </script>
</body>
</html>
