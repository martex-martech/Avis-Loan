<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Change Password</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Google Fonts - Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --secondary: #f9fafb;
      --text: #111827;
      --text-light: #6b7280;
      --border: #e5e7eb;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f3f4f6;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .main-content {
      padding: 24px 16px;
      margin-top: 60px;
      margin-bottom: 80px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-light);
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
      background-color: white;
      padding-right: 40px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 40px;
      color: var(--text-light);
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
    }

    .btn-primary:hover {
      background-color: var(--primary-light);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: white;
      padding: 12px 0;
      z-index: 40;
    }

    .nav-items {
      display: flex;
      justify-content: space-around;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-light);
      font-size: 12px;
      padding: 4px 12px;
    }

    .nav-item i {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .nav-item.active {
      color: var(--primary);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="header">
    <a href="Settings.html" class="header-action">
      <i class="fas fa-chevron-left"></i>
    </a>
    <div class="header-title">Change Password</div>
    <div class="header-actions"></div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <form id="changePasswordForm">
      <div class="form-group">
        <label class="form-label">Old Password</label>
        <input type="password" class="form-input" placeholder="Enter current password" id="oldPassword" required>
        <i class="fas fa-eye password-toggle" onclick="togglePassword('oldPassword', this)"></i>
      </div>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" placeholder="Enter new password" id="newPassword" required>
        <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword', this)"></i>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" class="form-input" placeholder="Confirm new password" id="confirmPassword" required>
        <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword', this)"></i>
      </div>

      <button type="submit" class="btn btn-primary w-full">
        UPDATE PASSWORD
      </button>
    </form>
  </main>


  <script>
    // Toggle password visibility
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = "password";
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    // Form submission
    document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Basic validation
      if (newPassword !== confirmPassword) {
        alert("New passwords don't match!");
        return;
      }

      if (newPassword.length < 8) {
        alert("Password must be at least 8 characters long!");
        return;
      }

      // Here you would typically send the data to your backend
      alert("Password changed successfully!");
      // window.location.href = "Settings.html";
    });

    // Button active state
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', function () {
          this.classList.add('active');
          setTimeout(() => {
            this.classList.remove('active');
          }, 150);
        });
      });
    });
  </script>
</body>
</html>
